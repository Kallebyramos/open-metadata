kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: openmetadata
nodes:
  - role: control-plane
    extraPortMappings:
      # OpenMetadata UI
      - containerPort: 30585
        hostPort: 8585
        protocol: TCP
      # Airflow UI
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
