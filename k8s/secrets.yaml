# ------------------------------------------------------------
# SECRETS TEMPLATE
# This file documents the expected secret structure.
# Create them with the Makefile target: make secrets
# or run the commands below manually.
# ------------------------------------------------------------

# Secret consumed by the OpenMetadata server to connect to MySQL.
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secrets
  namespace: openmetadata
type: Opaque
stringData:
  openmetadata-mysql-password: "openmetadata_password"

---

apiVersion: v1
kind: Secret
metadata:
  name: airflow-secrets
  namespace: openmetadata
type: Opaque
stringData:
  openmetadata-airflow-password: "admin"

---
apiVersion: v1
kind: Secret
metadata:
  name: airflow-mysql-secrets
  namespace: openmetadata
type: Opaque
stringData:
  airflow-mysql-password: "airflow_pass"
